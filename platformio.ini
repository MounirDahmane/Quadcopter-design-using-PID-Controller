; PlatformIO Build Configuration for ESP32 Quadcopter Flight Controller
; 
; This configuration file specifies:
; - Target microcontroller (ESP32)
; - Build framework (Arduino)
; - Serial monitor speed
; - Required library dependencies
;
; Project Structure (Modular):
; ================================
; src/
; ├── main.cpp / main_refactored.cpp
; │   └── Main flight loop (orchestration)
; ├── imu.h / imu.cpp
; │   └── Sensor reading & calibration
; ├── pid.h / pid.cpp
; │   └── Stabilization algorithm
; ├── motor.h / motor.cpp
; │   └── ESC & motor control
; ├── controller.h / controller.cpp
; │   └── WiFi communication
; └── secret.h
;     └── WiFi credentials (excluded from git)
;
; Usage:
; - Build: pio run
; - Upload: pio run -t upload
; - Monitor: pio device monitor
; - Clean: pio run -t clean

[env:esp32doit-devkit-v1]

; Platform: Espressif32 (provides ESP32 support)
platform = espressif32

; Board: ESP32 DevKit v1 (standard development board)
; Other options: esp32dev, esp32s2_saola_1, etc.
board = esp32dev

; Framework: Arduino (Arduino-compatible API)
framework = arduino

; Serial monitor baud rate for debug output
; Match this in Arduino IDE or PlatformIO monitor
monitor_speed = 115200

; Library dependencies (automatically downloaded and installed)
; Format: author/library_name @ version
lib_deps = 
    ; IMU sensor driver (MPU6050 6-axis gyro + accelerometer)
    ; Provides angle calculations and sensor fusion
    rfetick/MPU6050_light @ ^1.1.0
    
    ; Motor control library (PWM servo/ESC control)
    ; Provides ESP32 PWM generation for motor speed control
    madhephaestus/ESP32Servo @ ^3.0.8

; Optional: Advanced compiler flags
; build_flags = 
;     -DDEBUG_MODE

; Optional: Serial port for upload (auto-detect on most systems)
; upload_port = /dev/ttyUSB0

; Note: All .h and .cpp files in src/ are automatically compiled
; No need to manually list them
